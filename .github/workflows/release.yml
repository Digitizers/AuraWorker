name: Build and Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create plugin ZIP
        run: zip -r aurawp.zip aurawp/

      - name: Upload ZIP to release
        uses: softprops/action-gh-release@v2
        with:
          files: aurawp.zip
